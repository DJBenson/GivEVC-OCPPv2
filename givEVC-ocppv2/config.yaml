name: "GivEVC OCPPv2"
description: "GivEVC OCPP v2 integration for Home Assistant"
version: "1.0.0"
slug: "givevc-ocppv2"
url: "https://github.com/DJBenson/GivEVC-OCPPv2"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
homeassistant_api: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:ev-station"
panel_title: "GivEVC OCPPv2"
ports:
  7655/tcp: 7655
  9688/tcp: 9688
ports_description:
  7655/tcp: "OCPP WebSocket port (charger connects here)"
  9688/tcp: "Firmware transfer port"
map:
  - data
  - addon_config:rw
options:
  ocpp_port: 7655
  firmware_port: 9688
  public_ocpp_base_url: ""
  public_firmware_host: ""
  public_firmware_port: 9688
  firmware_manifest_url: "https://raw.githubusercontent.com/DJBenson/giv-firmware/refs/heads/main/Firmware/EVC/manifest.json"
  smtp_host: ""
  smtp_port: 587
  smtp_username: ""
  smtp_password: ""
  smtp_from: ""
  smtp_tls: true
  debug_logging: false
schema:
  ocpp_port: int
  firmware_port: int
  public_ocpp_base_url: str
  public_firmware_host: str
  public_firmware_port: int
  firmware_manifest_url: str
  smtp_host: str
  smtp_port: int
  smtp_username: str
  smtp_password: password
  smtp_from: str
  smtp_tls: bool
  debug_logging: bool

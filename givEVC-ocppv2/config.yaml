name: "GivEVC OCPPv2"
description: "GivEVC OCPP v2 integration for Home Assistant"
version: "0.1.0"
slug: "givevc-ocppv2"
url: "https://github.com/DJBenson/GivEVC-OCPPv2"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
homeassistant_api: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:ev-station"
panel_title: "GivEVC OCPPv2"
ports:
  7655/tcp: 7655
  9688/tcp: 9688
ports_description:
  7655/tcp: "OCPP WebSocket port (charger connects here)"
  9688/tcp: "Firmware transfer port"
map:
  - data
options:
  ocpp_port: 7655
  firmware_port: 9688
  firmware_manifest_url: "https://raw.githubusercontent.com/DJBenson/giv-firmware/refs/heads/main/Firmware/EVC/manifest.json"
  adopt_first_charger: true
  expected_charge_point_id: ""
  debug_logging: false
schema:
  ocpp_port: int
  firmware_port: int
  firmware_manifest_url: str
  adopt_first_charger: bool
  expected_charge_point_id: str
  debug_logging: bool
